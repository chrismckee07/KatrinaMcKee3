<!DOCTYPE html>
<html lang="en">
<head>
  <meta property="og:title" content="Katrina McKee - Contact">
  <meta property="og:description" content="Get in touch with Katrina McKee for inquiries, collaborations, or feedback.">
  <meta property="og:image" content="https://yourdomain.com/images/og-image.jpg">
  <meta property="og:url" content="https://katrinamckee.com.au/contact.html">
  <meta property="og:type" content="website">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="contact.css">
  <title>Katrina McKee - Contact</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>
<body>
  <script src="./header.js"></script>
  <div class="container">
    <div class = contact-container>
      <section class="contact-section">
        <h1>Contact Me</h1>
        <p>
          Have a question, event inquiry, media request, or just want to say hello?
          Send me a message.
        </p>

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div>
            <label for="fname">First name</label>
            <input type="text" id="fname" name="first_name" placeholder="" required />
          </div>
          <div>
            <label for="lname">Last name</label>
            <input type="text" id="lname" name="last_name" placeholder="" required />
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="" required />
          </div>
          <div>
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="" />
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
        
          <!-- Honeypot spam filter — keep this hidden -->
          <input type="text" name="_gotcha" style="display:none" />
        
          <button class="submit-button" type="submit">Send message</button>
        </form>
      </section>
    </div>
  </div>
  <script src="./footer.js"></script>
</body>
</html>
